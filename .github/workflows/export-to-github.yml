name: "[CUSTOM] Manually Sync Rules from Elastic Security to GitHub"

on:
  workflow_dispatch:
    inputs:
      pr_sync_rules_from_elastic:
        description: 'Sync rules from Elastic Security (PR vs direct commit)'
        type: boolean
        required: true
        default: true
      space:
        description: 'Specify the Kibana space to export rules from'
        type: string
        required: false
        default: 'default'

# Explicit permissions required for GitHub Actions to push code and create PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  manual-dispatch-sync:
    runs-on: ubuntu-latest
    env:
      CUSTOM_RULES_DIR: ${{ vars.CUSTOM_RULES_DIR }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Export Rules from Elastic Security and Import Rules to TOML
      run: |
        python -m detection_rules kibana --space "${{ inputs.space }}" export-rules --directory ${{ vars.CUSTOM_RULES_DIR }}/rules/ -s -sv -e -ac
      env:
        DR_KIBANA_URL: ${{ vars.KIBANA_URL }}
        DR_API_KEY: ${{ secrets.ELASTIC_APIKEY }} # Securely referenced from Secrets, not Vars

    - name: Update Version Lock
      run: |
        python -m detection_rules dev update-lock-versions --force

    # Replaces the manual git branch and infinilabs/gitea-pr steps
    - name: Create GitHub PR
      if: ${{ inputs.pr_sync_rules_from_elastic == true }}
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Sync rules from Elastic Security"
        title: "Updating code repository"
        body: "This PR was created automatically from GitHub Actions."
        branch: "feature/pulling-from-kibana"
        base: "main"
        delete-branch: true

    # Replaces the manual direct commit bash script
    - name: Commit Directly to Main
      if: ${{ inputs.pr_sync_rules_from_elastic == false }}
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Sync rules from Elastic Security"
        branch: main
