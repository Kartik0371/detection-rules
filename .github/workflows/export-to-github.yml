name: "[CUSTOM] Manually Sync Rules from Elastic Security to GitHub"

on:
  workflow_dispatch:
    inputs:
      pr_sync_rules_from_elastic:
        description: 'Sync rules from Elastic Security (PR vs direct commit)'
        type: boolean
        required: true
        default: true
      space:
        description: 'Specify the Kibana space to export rules from'
        type: string
        required: false
        default: 'default'

# Explicit permissions required for GitHub Actions to push code and create PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  manual-dispatch-sync:
    runs-on: ubuntu-latest
    # CRITICAL FIX: No global 'env' block here. We let setup-config run blind first.

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Initialize Custom Rules Configuration
      run: |
        echo "Setting up custom rules directory config..."
        # Create the folder structure cleanly based on your variable
        mkdir -p ${{ vars.CUSTOM_RULES_DIR }}/rules
        
        # Run setup-config BEFORE the framework sees the CUSTOM_RULES_DIR env variable
        python -m detection_rules custom-rules setup-config ${{ vars.CUSTOM_RULES_DIR }}

    - name: Export Rules from Elastic Security and Import Rules to TOML
      env:
        # NOW we inject the variables so the export command uses the generated config
        DR_KIBANA_URL: ${{ vars.KIBANA_URL }}
        DR_API_KEY: ${{ secrets.ELASTIC_APIKEY }}
        CUSTOM_RULES_DIR: ${{ vars.CUSTOM_RULES_DIR }}
      run: |
        # Safeguard to ensure the URL variable is actually populating
        if [ -z "${{ vars.KIBANA_URL }}" ]; then
          echo "ERROR: The KIBANA_URL variable is empty! Please check your GitHub Variables."
          exit 1
        fi
        
        # Notice we removed the trailing slash after 'rules' to prevent pathing errors
        python -m detection_rules kibana --kibana-url "${{ vars.KIBANA_URL }}" --space "${{ inputs.space }}" export-rules --directory ${{ vars.CUSTOM_RULES_DIR }}/rules -s -sv -e -ac

    - name: Update Version Lock
      env:
        # Required here as well so the framework knows which lock file to update
        CUSTOM_RULES_DIR: ${{ vars.CUSTOM_RULES_DIR }}
      run: |
        python -m detection_rules dev update-lock-versions --force

    - name: Create GitHub PR
      if: ${{ inputs.pr_sync_rules_from_elastic == true }}
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Sync: Export rules from Elastic Security"
        title: "DaC: Sync custom rules from Kibana"
        body: "Automated PR syncing the latest custom rule modifications exported from Kibana."
        branch: "feature/sync-kibana-rules"
        base: "main"
        delete-branch: true

    - name: Commit Directly to Main
      if: ${{ inputs.pr_sync_rules_from_elastic == false }}
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Sync: Direct commit of rules from Elastic Security"
        branch: main
