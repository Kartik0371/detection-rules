name: "[CUSTOM] Push Latest Rules to Elastic Security Space"

on:
  push:
    branches:
      - main
    paths:
      - '**/*.toml'
  workflow_dispatch:
    inputs:
      overwrite:
        description: 'Overwrite existing rules'
        type: boolean
        required: false
        default: true
      overwrite_exceptions:
        description: 'Overwrite existing exceptions'
        type: boolean
        required: false
        default: true
      overwrite_action_connectors:
        description: 'Overwrite existing action connectors'
        type: boolean
        required: false
        default: true
      space:
        description: 'Kibana space to use (dev or prod)'
        type: string
        required: false
        default: 'dac_production'

jobs:
  sync-to-production:
    runs-on: ubuntu-latest
    # CRITICAL FIX: The global 'env' block was removed from here.

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Initialize Custom Rules Configuration
      run: |
        echo "Setting up custom rules directory config..."
        mkdir -p ${{ vars.CUSTOM_RULES_DIR }}/rules
        
        # Because CUSTOM_RULES_DIR is not in the environment yet, this will boot successfully and generate the config file.
        python -m detection_rules custom-rules setup-config ${{ vars.CUSTOM_RULES_DIR }}

    - name: Import Rules to Kibana
      env:
        # NOW we explicitly inject the variable so the framework uses the config file we just generated.
        DR_KIBANA_URL: ${{ vars.KIBANA_URL }}
        DR_API_KEY: ${{ secrets.ELASTIC_APIKEY }}
        CUSTOM_RULES_DIR: ${{ vars.CUSTOM_RULES_DIR }}
      run: |
        FLAGS="-d ${{ vars.CUSTOM_RULES_DIR }}/rules --overwrite -e -ac"
        
        # Determine target space
        TARGET_SPACE="${{ inputs.space || 'dac_production' }}"
        
        echo "Pushing rules to Kibana space: $TARGET_SPACE"
        python -m detection_rules kibana --space "$TARGET_SPACE" import-rules $FLAGS
