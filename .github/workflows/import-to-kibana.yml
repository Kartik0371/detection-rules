name: "DaC 3: Push Rules to Elastic Security"

on:
  push:
    branches:
      - main
    paths:
      - '**/*.toml'
  workflow_dispatch:
    inputs:
      space:
        description: 'Kibana space to use (dev or prod)'
        type: string
        required: false
        default: 'dac_production'
      overwrite:
        description: 'Overwrite existing rules in Kibana'
        type: boolean
        required: true
        default: true

jobs:
  import-rules:
    runs-on: ubuntu-latest
    env:
      DR_KIBANA_URL: ${{ vars.KIBANA_URL }}
      DR_API_KEY: ${{ secrets.ELASTIC_APIKEY }}
      CUSTOM_RULES_DIR: ${{ vars.CUSTOM_RULES_DIR }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Import Rules to Kibana
      run: |
        # Start with the base flags
        FLAGS="-d ${{ vars.CUSTOM_RULES_DIR }}/rules -e -ac"
        
        # Logic check: If triggered by a push OR if the manual checkbox is true, add the overwrite flag
        if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ inputs.overwrite }}" == "true" ]]; then
          FLAGS="$FLAGS --overwrite"
          echo "Action: Overwriting existing rules in Kibana."
        else
          echo "Action: Overwrite is DISABLED. Existing Kibana rules will be skipped."
        fi
        
        # Determine target space
        TARGET_SPACE="${{ inputs.space || 'dac_production' }}"
        
        echo "Pushing rules to Kibana space: $TARGET_SPACE"
        python -m detection_rules kibana --space "$TARGET_SPACE" import-rules $FLAGS
