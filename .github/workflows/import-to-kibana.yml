name: "DaC 3: Push Rules to Elastic Security"

on:
  # 1. THE AUTOMATED TRIGGER (Runs silently on PR Merge)
  push:
    branches:
      - main
    paths:
      - 'custom/rules/**/*.toml' # Strictly watch this folder
  
  # 2. THE MANUAL TRIGGER (Provides the UI options)
  workflow_dispatch:
    inputs:
      space:
        description: 'Kibana space to use'
        type: string
        required: false
        default: 'dac_production'
      overwrite:
        description: 'Overwrite existing rules in Kibana'
        type: boolean
        required: true
        default: true

jobs:
  import-rules:
    runs-on: ubuntu-latest
    env:
      DR_KIBANA_URL: ${{ vars.KIBANA_URL }}
      DR_API_KEY: ${{ secrets.ELASTIC_APIKEY }}
      CUSTOM_RULES_DIR: ${{ vars.CUSTOM_RULES_DIR }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Import Rules to Kibana
      run: |
        FLAGS="-d ${{ vars.CUSTOM_RULES_DIR }}/rules -e -ac"
        
        # INTELLIGENT ROUTING LOGIC
        if [[ "${{ github.event_name }}" == "push" ]]; then
          echo "Trigger: PR Merge detected. Enforcing production deployment."
          FLAGS="$FLAGS --overwrite"
          TARGET_SPACE="dac_production" # Hardcode your actual production space name here
        else
          echo "Trigger: Manual run detected. Using user inputs."
          TARGET_SPACE="${{ inputs.space }}"
          if [[ "${{ inputs.overwrite }}" == "true" ]]; then
            FLAGS="$FLAGS --overwrite"
          fi
        fi
        
        echo "Pushing rules to Kibana space: $TARGET_SPACE"
        python -m detection_rules kibana --space "$TARGET_SPACE" import-rules $FLAGS
