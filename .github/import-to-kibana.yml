name: "DaC 2: Sync Rules from Kibana to GitHub"

on:
  workflow_dispatch:
    inputs:
      space:
        description: 'Specify the Kibana space to export rules from'
        type: string
        required: false
        default: 'default'

permissions:
  contents: write
  pull-requests: write

jobs:
  export-rules:
    runs-on: ubuntu-latest
    env:
      DR_KIBANA_URL: ${{ vars.KIBANA_URL }}
      DR_API_KEY: ${{ secrets.ELASTIC_APIKEY }}
      CUSTOM_RULES_DIR: ${{ vars.CUSTOM_RULES_DIR }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Export Rules to TOML
      run: |
        python -m detection_rules kibana --kibana-url "${{ vars.KIBANA_URL }}" --space "${{ inputs.space }}" export-rules --directory ${{ vars.CUSTOM_RULES_DIR }}/rules -s -sv -e -ac

    - name: Update Version Lock
      run: |
        python -m detection_rules dev update-lock-versions --force

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Sync: Export rules from Elastic Security"
        title: "DaC: Review exported Kibana rules"
        body: "Automated PR syncing custom rule modifications from Kibana."
        branch: "feature/sync-kibana-rules"
        base: "main"
        delete-branch: true
