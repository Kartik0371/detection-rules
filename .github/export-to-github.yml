name: "[CUSTOM] Manually Sync Rules from Elastic Security to Gitea"

on:
  workflow_dispatch:
    inputs:
      pr_sync_rules_from_elastic:
        description: 'Sync rules from Elastic Security (direct commit (false) vs PR (true))'
        required: true
        default: 'true'
      space:
        description: 'Specify the Kibana space to export rules from'
        required: false
        default: 'default'

jobs:
  manual-dispatch-sync:
    runs-on: ubuntu-latest
    env:
      CUSTOM_RULES_DIR: ${{ vars.CUSTOM_RULES_DIR }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        pip install .[dev]

    - name: Export Rules from Elastic Security and Import Rules to TOML
      run: |
        python -m detection_rules kibana --space "${{ gitea.event.inputs.space }}" export-rules --directory ${{ vars.CUSTOM_RULES_DIR }}/rules/ -s -sv -e -ac
      env:
        DR_KIBANA_URL: ${{ vars.KIBANA_URL }}
        DR_API_KEY: ${{ vars.ELASTIC_APIKEY }}

    - name: Update Version Lock
      run: |
        python -m detection_rules dev update-lock-versions --force

    - name: Create branch with changes
      if: gitea.event.inputs.pr_sync_rules_from_elastic == 'true'
      run: |
        git config --global user.name 'Gitea Action'
        git config --global user.email 'action@gitea.io'
        git checkout -b feature/pulling-from-kibana
        git add -A
        git commit -m "Sync rules from Elastic Security" || echo "No changes to commit"
        git push --set-upstream origin feature/pulling-from-kibana

    - name: Create Gitea PR
      if: gitea.event.inputs.pr_sync_rules_from_elastic == 'true'
      uses: infinilabs/gitea-pr@v0
      with:
        url: http://gitea:3000       # Your Gitea instance URL
        token: ${{ secrets.SECRET_TOKEN }}   # Your Gitea Personal Access Token
        commit-message: 'Updated from GitHub Actions'  # Optional: Custom commit message
        committer: 'GitHub Actions <actions@github.com>' # Optional: Custom committer
        base: 'main'                                # The target branch in Gitea (default: main or master, according to Gitea config)
        branch: 'feature/pulling-from-kibana'                 # The source branch for the PR (defaults to a generated branch name)
        title: 'Updating code repository'               # Optional: Custom PR title
        body: 'This PR was created automatically.'       # Optional: Custom PR body
        tea_version: 0.10.1
    - name: Commit Directly to Main
      if: gitea.event.inputs.pr_sync_rules_from_elastic == 'false'
      run: |
        git config --global user.name 'Gitea Action'
        git config --global user.email 'action@gitea.io'
        git add -A
        git commit -m "Sync rules from Elastic Security" || echo "No changes to commit"
        git push
